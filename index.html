<!DOCTYPE html>
<html>
<head>
<title>My Cutie Surprise</title>

<style>

body{
margin:0;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
flex-direction:column;
font-family:Arial;
color:white;
overflow:hidden;

/* animated gradient background */

background:linear-gradient(270deg,#ff4e50,#ff6ec4,#f9d423,#24c6dc);
background-size:800% 800%;
animation:bg 10s ease infinite;
}

@keyframes bg{
0%{background-position:0% 50%;}
50%{background-position:100% 50%;}
100%{background-position:0% 50%;}
}

button{
padding:15px 30px;
font-size:18px;
cursor:pointer;
position:absolute;
border:none;
border-radius:10px;
}

video{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
object-fit:cover;
}

/* hearts */

.heart{
position:absolute;
color:red;
font-size:20px;
animation:float 6s linear infinite;
}

@keyframes float{
0%{transform:translateY(100vh);opacity:1;}
100%{transform:translateY(-10vh);opacity:0;}
}

</style>
</head>

<body>

<h2 id="text">Catch the button to unlock your surprise 😆</h2>

<button id="btn">Click Me</button>

<div id="loading" style="display:none;">
<h2>Preparing your surprise 💘</h2>
<p id="percent">0%</p>
</div>

<div id="videoPage" style="display:none;">
<video id="myVideo" autoplay muted playsinline>
<source src="Vid.mp4" type="video/mp4">
</video>
</div>

<div id="lovePage" style="display:none;">
<h1 style="font-size:50px;">Love you Cutieee 🫶❤️‍🩹😚</h1>
</div>

<script>

/* moving button prank */

let btn=document.getElementById("btn");
let moveCount=0;

btn.style.top="60%";
btn.style.left="45%";

btn.addEventListener("mouseover",function(){

if(moveCount<6){

let x=Math.random()*80;
let y=Math.random()*80;

btn.style.left=x+"vw";
btn.style.top=y+"vh";

moveCount++;

}

});

/* click */

btn.addEventListener("click",startLoading);

function startLoading(){

btn.style.display="none";
document.getElementById("text").style.display="none";
document.getElementById("loading").style.display="block";

let percent=0;

let load=setInterval(function(){

percent++;

document.getElementById("percent").innerHTML=percent+"%";

if(percent>=100){

clearInterval(load);

document.getElementById("loading").style.display="none";
showVideo();

}

},40);

}

function showVideo(){

document.getElementById("videoPage").style.display="block";

let video=document.getElementById("myVideo");

video.play();

video.onended=function(){

document.getElementById("videoPage").style.display="none";
document.getElementById("lovePage").style.display="block";

}

}

/* hearts */

function createHeart(){

let heart=document.createElement("div");

heart.classList.add("heart");

heart.innerHTML="❤️";

heart.style.left=Math.random()*100+"vw";

heart.style.fontSize=(20+Math.random()*30)+"px";

document.body.appendChild(heart);

setTimeout(()=>heart.remove(),6000);

}

setInterval(createHeart,300);

</script>

</body>
</html>
