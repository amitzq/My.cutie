<!DOCTYPE html><html>
<head>
<title>My Cutie Surprise</title><style>
body{
margin:0;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
flex-direction:column;
font-family:Arial;
color:white;
overflow:hidden;

background:linear-gradient(-45deg,#ff4e50,#ff6ec4,#f9d423,#24c6dc);
background-size:400% 400%;
animation:bg 10s infinite;
}

@keyframes bg{
0%{background-position:0% 50%;}
50%{background-position:100% 50%;}
100%{background-position:0% 50%;}
}

button{
padding:20px 50px;
font-size:22px;
border:4px solid black;
border-radius:12px;
background:white;
color:black;
font-weight:bold;
cursor:pointer;
margin:10px;
}

#btn{
position:absolute;
top:65%;
left:45%;
}

video{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
object-fit:cover;
}

.page{
display:none;
text-align:center;
}

#loading{
display:none;
}

</style></head><body><h2 id="text">Try to catch the button 😆</h2>
<button id="btn">CLICK ME</button><div id="loading">
<h2>Preparing your surprise 💘</h2>
<p id="percent">0%</p>
</div><div id="videoPage" class="page">
<video id="myVideo" controls playsinline>
<source src="Vid.mp4" type="video/mp4">
</video>
</div><div id="proposalPage" class="page">
<h1>Will you stay with me forever? 💍</h1>
<button onclick="yes()">YES ❤️</button>
<button id="noBtn">NO 😆</button>
</div><div id="lovePage" class="page">
<h1 style="font-size:50px;">Love you Cutieee 🫶❤️‍🩹😚</h1>
</div><script>

/* moving button */

let btn=document.getElementById("btn");
let moveCount=0;

btn.addEventListener("mouseover",moveBtn);
btn.addEventListener("touchstart",moveBtn);

function moveBtn(){

if(moveCount<5){

btn.style.left=Math.random()*80+"vw";
btn.style.top=Math.random()*80+"vh";

moveCount++;

}

}

/* click */

btn.onclick=function(){

btn.style.display="none";
document.getElementById("text").style.display="none";
document.getElementById("loading").style.display="block";

let p=0;

let load=setInterval(function(){

p++;
document.getElementById("percent").innerHTML=p+"%";

if(p>=100){

clearInterval(load);
document.getElementById("loading").style.display="none";

showVideo();

}

},40);

}

function showVideo(){

document.getElementById("videoPage").style.display="block";

let video=document.getElementById("myVideo");

/* click to play */

video.onclick=function(){
video.play();
}

/* when video ends */

video.addEventListener("ended",function(){

document.getElementById("videoPage").style.display="none";
document.getElementById("proposalPage").style.display="block";

});

}

/* YES */

function yes(){

document.getElementById("proposalPage").style.display="none";
document.getElementById("lovePage").style.display="block";

}

/* NO move */

let noBtn=document.getElementById("noBtn");

noBtn.addEventListener("mouseover",moveNo);
noBtn.addEventListener("touchstart",moveNo);

function moveNo(){

noBtn.style.position="absolute";
noBtn.style.left=Math.random()*80+"vw";
noBtn.style.top=Math.random()*80+"vh";

}

</script></body>
</html>
